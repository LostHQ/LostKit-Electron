<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .stream-bar {
      flex: 0 0 32px;
      width: 100%;
      background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
      border-bottom: 1px solid #8b6914;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .stream-bar-title {
      flex: 1;
      color: #f0e68c;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .stream-bar button {
      -webkit-app-region: no-drag;
      flex-shrink: 0;
      background: #333;
      border: 1px solid #555;
      border-radius: 4px;
      color: #f0e68c;
      font-size: 11px;
      cursor: pointer;
      padding: 0 8px;
      height: 22px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .stream-bar button:hover    { background: #444; border-color: #8b6914; }
    .stream-bar button.active   { background: linear-gradient(135deg, #8b6914, #5a4500); border-color: #c8941c; color: #fff; }
    .stream-bar button:disabled { opacity: 0.3; cursor: default; }
    .close-btn {
      background: #5a0000 !important;
      border-color: #882222 !important;
      color: #ff9999 !important;
      width: 22px;
      padding: 0 !important;
    }
    .close-btn:hover { background: #780000 !important; }

    .stream-content {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      background: #000;
    }
    .stream-pane {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      position: relative;
    }
    .chat-pane {
      flex: 0 0 340px;
      min-height: 0;
      border-left: 1px solid #8b6914;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .chat-pane.hidden { display: none; }

    /* Sign-in notice shown when not logged in */
    .chat-signin-notice {
      position: absolute;
      bottom: 60px;
      left: 0; right: 0;
      background: rgba(20,20,20,0.92);
      border-top: 1px solid #8b6914;
      padding: 8px 12px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    webview {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="stream-bar">
    <span class="stream-bar-title" id="bar-title">Loading...</span>
    <span id="viewer-count" style="display:none;flex-shrink:0;font-size:10px;color:#2ecc40;white-space:nowrap;margin-right:2px;"></span>
    <label id="pin-toggle" title="Keep window always on top" style="-webkit-app-region:no-drag;display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;background:#333;border:1px solid #555;border-radius:4px;padding:0 8px;height:22px;font-size:11px;color:#f0e68c;user-select:none;transition:background 0.15s,border-color 0.15s;">
      <input type="checkbox" id="pin-checkbox" style="display:none" onchange="togglePin(this.checked)" />
      <span>📌</span><span>On Top</span>
    </label>
    <button id="btn-chat" onclick="toggleChat()">&#128172; Chat</button>
    <button id="btn-video" onclick="toggleVideo()" title="Hide video, keep audio playing">&#127911; Audio</button>
    <button class="close-btn" onclick="closeStream()">&#10005;</button>
  </div>

  <div class="stream-content">
    <div class="stream-pane" id="stream-pane"></div>
    <div class="chat-pane hidden" id="chat-pane"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const params   = new URLSearchParams(window.location.search);
    const videoId  = params.get('v') || '';
    const rawTitle = decodeURIComponent(params.get('title') || 'Stream');
    const isLive   = params.get('live') === '1';

    document.getElementById('bar-title').textContent = rawTitle;
    document.title = rawTitle;

    let chatOpen    = false;
    let chatLoaded  = false;
    let streamWv    = null;
    let chatWv      = null;
    let videoHidden = false;
    let prevWinWidth = null;

    const chatOnly = params.get('chatOnly') === '1' || params.get('chatOnly') === 'true';

    // ── CSS: hide chrome, never touch movie_player or video element ──────────
    const HIDE_CHROME_CSS = `
      #masthead-container, ytd-masthead, #masthead {
        display: none !important; height: 0 !important;
      }
      #secondary, #secondary-inner,
      ytd-watch-next-secondary-results-renderer,
      #below, #info, #info-contents,
      ytd-comments, #comments,
      ytd-engagement-panel-section-list-renderer,
      tp-yt-app-drawer, #guide, #mini-guide,
      ytd-miniplayer, #guide-button,
      .ytp-miniplayer-button,
      ytd-feed-filter-chip-bar-renderer { display: none !important; }

      /* Keep ytd-watch-metadata in the DOM (so YT updates viewer count)
         but visually hide it — position off-screen, zero height */
      ytd-watch-metadata {
        position: fixed !important;
        top: -9999px !important; left: -9999px !important;
        width: 1px !important; height: 1px !important;
        overflow: hidden !important; pointer-events: none !important;
        visibility: hidden !important;
      }

      html, body { overflow: hidden !important; background: #000 !important; }
      ytd-app, #page-manager, ytd-page-manager {
        background: #000 !important; padding: 0 !important; margin: 0 !important;
      }
      ytd-watch-flexy { margin: 0 !important; padding: 0 !important; min-height: 100vh !important; }
      ytd-watch-flexy #primary, ytd-watch-flexy #primary-inner {
        width: 100% !important; max-width: 100% !important;
        min-width: 100% !important; margin: 0 !important; padding: 0 !important;
      }
      #player-container-outer, #player-container, ytd-player, #player {
        width: 100vw !important; max-width: 100vw !important;
        height: 100vh !important; max-height: 100vh !important;
        margin: 0 !important; padding: 0 !important;
      }
    `;

    function injectChrome(wv) {
      wv.insertCSS(HIDE_CHROME_CSS).catch(() => {});
    }

    // ── Stream webview — persistent session so YT login is remembered ────────
    function buildStreamWebview() {
      const pane = document.getElementById('stream-pane');
      const wv   = document.createElement('webview');
      wv.setAttribute('allowpopups', '');
      // persist:youtube — saves cookies/login across restarts
      wv.setAttribute('partition', 'persist:youtube');
      wv.src = `https://www.youtube.com/watch?v=${videoId}&autoplay=1`;
      pane.appendChild(wv);

      wv.addEventListener('dom-ready', () => { injectChrome(wv); updateBackBtn(); startInfoPolling(); });
      wv.addEventListener('did-navigate', () => { injectChrome(wv); updateBackBtn(); });
      wv.addEventListener('did-navigate-in-page', updateBackBtn);

      streamWv = wv;
    }

    // ── Chat webview ─────────────────────────────────────────────────────────
    function buildChatWebview() {
      if (chatLoaded) return;
      const pane = document.getElementById('chat-pane');

      if (isLive) {
        // Live stream — popout chat: full read + write, login-aware
        const wv = document.createElement('webview');
        wv.setAttribute('allowpopups', '');
        wv.setAttribute('partition', 'persist:youtube');
        wv.src = `https://www.youtube.com/live_chat?v=${videoId}&is_popout=1`;
        pane.appendChild(wv);
        chatWv = wv;
      } else {
        // VOD — chat replay has no standalone URL, show a clear message
        pane.innerHTML = `
          <div style="
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            height:100%; background:#111; color:#888; font-size:12px;
            font-family:Arial,sans-serif; text-align:center; padding:20px; gap:12px;
          ">
            <div style="font-size:28px">💬</div>
            <div style="color:#f0e68c; font-size:13px; font-weight:bold;">Chat Replay</div>
            <div style="line-height:1.6;">
              YouTube doesn't provide a standalone chat replay URL.<br><br>
              Chat replay is only visible on the full YouTube page.
            </div>
            <a href="#" onclick="openOnYoutube()" style="
              margin-top:8px; padding:6px 14px;
              background:#8b6914; border:none; border-radius:4px;
              color:#fff; font-size:12px; cursor:pointer; text-decoration:none;
            ">Open on YouTube</a>
          </div>`;
      }

      chatLoaded = true;
    }

    function openOnYoutube() {
      require('electron').ipcRenderer.send('open-external', `https://www.youtube.com/watch?v=${videoId}`, 'YouTube');
    }

    function toggleChat() {
      chatOpen = !chatOpen;
      const pane = document.getElementById('chat-pane');
      const btn  = document.getElementById('btn-chat');
      if (chatOpen) {
        buildChatWebview();
        pane.classList.remove('hidden');
        btn.classList.add('active');
        btn.textContent = '✕ Chat';
      } else {
        pane.classList.add('hidden');
        btn.classList.remove('active');
        btn.textContent = '💬 Chat';
      }
      ipcRenderer.send('set-stream-chat-open', chatOpen);
    }

    function togglePin(val) {
      ipcRenderer.send('set-stream-always-on-top', val);
      const lbl = document.getElementById('pin-toggle');
      lbl.style.background = val ? 'linear-gradient(135deg,#8b6914,#5a4500)' : '#333';
      lbl.style.borderColor = val ? '#c8941c' : '#555';
      lbl.style.color       = val ? '#fff'    : '#f0e68c';
    }

    function applyPin(val) {
      document.getElementById('pin-checkbox').checked = val;
      togglePin(val);
    }

    function setVideoHidden(hidden) {
      videoHidden = hidden;
      const streamPane = document.getElementById('stream-pane');
      const btn = document.getElementById('btn-video');
      if (hidden) {
        // Collapse stream pane to zero width WITHOUT display:none — audio keeps playing
        streamPane.style.flex = '0 0 0';
        streamPane.style.overflow = 'hidden';
        streamPane.style.minWidth = '0';
        btn.classList.add('active');
        btn.innerHTML = '&#9654; Video';
      } else {
        streamPane.style.flex = '';
        streamPane.style.overflow = '';
        streamPane.style.minWidth = '';
        btn.classList.remove('active');
        btn.innerHTML = '&#127911; Audio';
      }
      ipcRenderer.send('set-stream-video-hidden', { hidden, restoreWidth: prevWinWidth });
    }

    function toggleVideo() {
      if (!videoHidden) {
        // Going audio-only: store current width, open chat if not open, collapse video
        ipcRenderer.invoke('get-stream-bounds').then(b => {
          prevWinWidth = b ? b.width : 960;
          if (!chatOpen) toggleChat(); // auto-open chat
          setVideoHidden(true);
        });
      } else {
        setVideoHidden(false);
      }
    }

    function goBack() {
      if (streamWv && streamWv.canGoBack()) streamWv.goBack();
    }

    function updateBackBtn() {
      document.getElementById('btn-back').disabled = !(streamWv && streamWv.canGoBack());
    }

    // ── Stream title + viewer count polling ──────────────────────────────────
    // Fetches the YT watch page HTML from main process and parses ytInitialData —
    // far more reliable than DOM scraping inside the webview.
    let infoPoller = null;

    function startInfoPolling() {
      if (infoPoller) { clearInterval(infoPoller); infoPoller = null; }
      setTimeout(fetchStreamInfo, 2000);
      setTimeout(fetchStreamInfo, 7000);
      infoPoller = setInterval(fetchStreamInfo, 30000);
    }

    async function fetchStreamInfo() {
      if (!videoId) return;
      try {
        // Fetch the raw watch page from main process — avoids all webview DOM issues
        const html = await ipcRenderer.invoke('fetch-url-for-channel-id',
          `https://www.youtube.com/watch?v=${videoId}`);
        if (!html) return;

        // ── Title ──────────────────────────────────────────────────────────
        let title = null;
        // og:title is the cleanest source — always present, no "- YouTube" suffix
        const ogTitle = html.match(/<meta property="og:title" content="([^"]+)"/);
        if (ogTitle) title = ogTitle[1].replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>');
        if (!title) {
          const t = html.match(/"title":\{"runs":\[\{"text":"([^"]+)"\}\]/);
          if (t) title = t[1];
        }

        // ── Viewer count ───────────────────────────────────────────────────
        let viewers = null;
        // Pattern 1: "viewCount":{"videoViewCountRenderer":{"viewCount":{"runs":[{"text":"X,XXX"},{"text":" watching now"}
        const vcRuns = html.match(/"viewCount":\{"runs":\[\{"text":"([^"]+)"\},\{"text":"([^"]+)"\}/);
        if (vcRuns) viewers = vcRuns[1] + vcRuns[2]; // e.g. "12,345 watching now"

        // Pattern 2: "viewCount":{"videoViewCountRenderer":{"viewCount":{"simpleText":"X,XXX watching"}
        if (!viewers) {
          const vcSimple = html.match(/"videoViewCountRenderer":\{"viewCount":\{"simpleText":"([^"]+)"/);
          if (vcSimple) viewers = vcSimple[1];
        }

        // Pattern 3: short form "X.XK watching" in extraShortViewCount
        if (!viewers) {
          const vcShort = html.match(/"extraShortViewCount":\{"simpleText":"([^"]+)"/);
          if (vcShort) viewers = vcShort[1];
        }

        // Pattern 4: plain viewCount number in videoDetails (live streams)
        if (!viewers) {
          const vcDetail = html.match(/"viewCount":"(\d+)"[^}]*"isLive":true/);
          if (!vcDetail) {
            const vcDetail2 = html.match(/"isLive":true[^}]*"viewCount":"(\d+)"/);
            if (vcDetail2) viewers = Number(vcDetail2[1]).toLocaleString() + ' watching';
          } else {
            viewers = Number(vcDetail[1]).toLocaleString() + ' watching';
          }
        }

        // ── Update UI ──────────────────────────────────────────────────────
        if (title) {
          document.getElementById('bar-title').textContent = title;
          document.title = title;
        }

        const vcSpan = document.getElementById('viewer-count');
        if (isLive && viewers) {
          // Trim to just the number + "watching" — strip "now", extra whitespace
          const clean = viewers.replace(/\s+now$/i,'').replace(/\s+/g,' ').trim();
          vcSpan.textContent = '👁 ' + clean;
          vcSpan.style.display = '';
        } else {
          vcSpan.style.display = 'none';
        }
      } catch(e) { /* silent fail */ }
    }

    function closeStream() {
      if (infoPoller) { clearInterval(infoPoller); infoPoller = null; }
      ipcRenderer.send('close-stream-window');
    }

    // Restore saved prefs (pin, chat, etc.) then build the webview
    ipcRenderer.invoke('get-stream-prefs').then(prefs => {
      buildStreamWebview();
      if (prefs.pinned) applyPin(true);
      if (chatOnly) {
        // Chat-only mode: open chat, then collapse video pane
        toggleChat();
        ipcRenderer.invoke('get-stream-bounds').then(b => {
          prevWinWidth = b ? b.width : 960;
          setVideoHidden(true);
        });
      } else if (prefs.videoHidden) {
        // Restore audio-only mode — open chat if it was open too
        prevWinWidth = prefs.prevWinWidth || 960;
        if (prefs.chatOpen) toggleChat();
        setVideoHidden(true);
      } else if (prefs.chatOpen) {
        toggleChat();
      }
    }).catch(() => buildStreamWebview());
  </script>
</body>
</html>
